name: Daily Email Marketing Brief

on:
  schedule:
    # 2:00 AM UTC = 9:00 AM Vietnam time (GMT+7)
    - cron: '0 2 * * *'
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  daily-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DAILY_BRIEF_SLACK_TOKEN: ${{ secrets.DAILY_BRIEF_SLACK_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_USER_ID: ${{ secrets.SLACK_USER_ID }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          KLAVIYO_PRIVATE_API_KEY: ${{ secrets.KLAVIYO_PRIVATE_API_KEY }}
        run: python scripts/daily_brief.py

      - name: Notify on failure
        if: failure()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_USER_ID: ${{ secrets.SLACK_USER_ID }}
        run: |
          python - <<'EOF'
          import os
          token = os.environ.get("SLACK_BOT_TOKEN", "")
          uid   = os.environ.get("SLACK_USER_ID", "")
          if not token or not uid:
              print("Slack secrets not set — skipping failure notification")
          else:
              from slack_sdk import WebClient
              try:
                  WebClient(token=token).chat_postMessage(
                      channel=uid,
                      text="⚠️ *CoBa's Daily Brief failed today.* Check GitHub Actions for details."
                  )
              except Exception as e:
                  print(f"Slack notification failed: {e}")
          EOF
