name: Daily US Trend Report

on:
  schedule:
    # 10:00 AM Eastern Time = 15:00 UTC (14:00 UTC during EDT)
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip Slack send (dry run)'
        required: false
        default: 'false'
        type: boolean

jobs:
  trend-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trend agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: TrendPulse/1.0
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          REPORTS_DIR: reports
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python -m agent.main $DRY_RUN_FLAG

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trend-report-${{ github.run_id }}
          path: reports/
          retention-days: 90

      - name: Commit reports to repository
        if: success()
        run: |
          git config user.name "TrendPulse Bot"
          git config user.email "trendpulse@noreply.github.com"
          git add reports/
          git diff --staged --quiet || git commit -m "chore: add trend report $(date +%Y-%m-%d)"
          git push origin HEAD
